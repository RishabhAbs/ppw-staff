<body class="min-h-screen flex flex-col items-center justify-between text-on-surface">
<!-- Top Navigation / Close (Transactional Suppressed Shell) -->
<nav class="w-full flex justify-between items-center px-6 h-16 fixed top-0 z-50">

<!-- Main Content Canvas -->
<main class="w-full max-w-md px-8 pt-24 pb-12 flex flex-col items-center flex-grow">

<div class="mb-10 flex flex-col items-center">
<div class="w-20 h-20 rounded-full border border-outline-variant/30 flex items-center justify-center mb-6 bg-surface-container-lowest premium-shadow">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-on-primary font-black text-2xl tracking-tighter">

                </div>
</div>
<h1 class="text-4xl font-black text-on-surface tracking-tighter mb-1">P.P.W</h1>
<p class="text-on-surface-variant font-medium tracking-wide text-xs uppercase opacity-70">Purbanchal Papers &amp; Works</p>
</div>
<!-- Sign In Form -->
<div class="w-full space-y-5">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="text-[10px] uppercase tracking-[0.08em] font-bold text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-b border-outline-variant/20 rounded-xl focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all text-on-surface placeholder:text-outline/50" placeholder="alex@artisan.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-[10px] uppercase tracking-[0.08em] font-bold text-on-surface-variant ml-1">Password</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-b border-outline-variant/20 rounded-xl focus:border-primary focus:bg-surface-container-lowest focus:ring-0 transition-all text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline hover:text-primary transition-colors">visibility</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end pr-1">
<a class="text-[11px] font-bold uppercase tracking-wider text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-14 copper-gradient text-on-primary font-bold rounded-xl premium-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4">
                SIGN IN
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="py-6 flex items-center gap-4">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-widest">OR</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<!-- Secondary Action -->
<button class="w-full h-14 border border-outline-variant/40 text-primary font-bold rounded-xl hover:bg-surface-container transition-all active:scale-[0.98]">
