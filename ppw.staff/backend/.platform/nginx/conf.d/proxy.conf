# Don't let the EB nginx reverse proxy cap upload size.
# Images are compressed client-side before upload, so the body is already
# small; nginx's 1 MB default was rejecting them with HTTP 413 ("client
# intended to send too large body") BEFORE the request reached the Node app,
# which surfaced in the UI as "Failed to save".
#
# 0 = no nginx-level limit. The real backstop stays in the app:
# item-details.controller.ts caps each file at MAX_UPLOAD_MB (default 100 MB)
# and at most 12 files per request.
client_max_body_size 0;
